<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- A celestial disc, slightly imperfect, with a soft halo of rays.
       Reads as either a sun or a low moon depending on the
       composition surface. Sized to sit just above an implied
       horizon (the bottom 25 percent of the viewBox is reserved as
       breathing room for the horizon line). -->
  <!-- Halo: 12 thin radiating rays at varying lengths around the disc.
       The rays are paths so they take the same fill as the disc. -->
  <path d="M 50 6 L 51.6 18 L 50 20 L 48.4 18 Z" />
  <path d="M 64 9 L 60.6 19.5 L 58.6 20.5 L 60.4 17 Z" />
  <path d="M 76 16 L 68 24 L 66.5 23 L 73 16.5 Z" />
  <path d="M 86 26 L 75 31 L 74 29.5 L 84 24.5 Z" />
  <path d="M 92 40 L 80 41.5 L 79.5 39.5 L 91 38 Z" />
  <path d="M 36 9 L 39.4 19.5 L 41.4 20.5 L 39.6 17 Z" />
  <path d="M 24 16 L 32 24 L 33.5 23 L 27 16.5 Z" />
  <path d="M 14 26 L 25 31 L 26 29.5 L 16 24.5 Z" />
  <path d="M 8 40 L 20 41.5 L 20.5 39.5 L 9 38 Z" />
  <!-- Disc: an irregular polygon with 24 sides, a touch of asymmetry
       so the edge does not look mathematically perfect. -->
  <path d="M 50 22
           L 56 23
           L 61 25
           L 65 28
           L 68 32
           L 70 36
           L 71 41
           L 71 47
           L 70 52
           L 68 56
           L 65 60
           L 61 62
           L 56 63
           L 50 64
           L 44 63
           L 39 62
           L 35 60
           L 32 56
           L 30 52
           L 29 47
           L 29 41
           L 30 36
           L 32 32
           L 35 28
           L 39 25
           L 44 23 Z" />
  <!-- Two small craters / sunspots for character -->
  <ellipse cx="58" cy="40" rx="2.2" ry="1.6" fill="#ffffff" fill-opacity="0.18" />
  <ellipse cx="42" cy="50" rx="1.8" ry="1.3" fill="#ffffff" fill-opacity="0.14" />
</svg>
