<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- The Pequod: three-masted whaler, side profile. Hull with sheer
       curve, bowsprit, three masts each carrying a course and a
       topsail, a forward jib, yards crossed. Slight forward heel
       suggests active sailing. -->
  <!-- Hull: bow at right, stern at left. Curved sheer. -->
  <path d="M 4 64
           Q 6 60 14 60
           L 86 60
           Q 92 60 96 62
           L 98 64
           L 96 74
           Q 90 78 50 80
           Q 14 80 6 76
           Q 3 72 4 64 Z" />
  <!-- Deck stripe (thin highlight where gunwale meets hull) -->
  <path d="M 8 64 L 96 64 L 96 65 L 8 65 Z" />
  <!-- Bowsprit, angled up slightly forward -->
  <path d="M 96 62 L 100 56 L 100 58 L 96 64 Z" />
  <!-- Foremast (rightmost on right-facing ship) -->
  <rect x="78" y="16" width="1.5" height="44" />
  <!-- Mainmast (centre, tallest) -->
  <rect x="50" y="6" width="1.5" height="54" />
  <!-- Mizzenmast (left, slightly shorter) -->
  <rect x="22" y="20" width="1.5" height="40" />
  <!-- Yards: thin horizontal cross-pieces, three per mast -->
  <rect x="70" y="49" width="18" height="0.8" />
  <rect x="71" y="33" width="16" height="0.7" />
  <rect x="73" y="20" width="12" height="0.6" />
  <rect x="40" y="45" width="22" height="1" />
  <rect x="42" y="27" width="18" height="0.8" />
  <rect x="44" y="12" width="14" height="0.7" />
  <rect x="14" y="49" width="18" height="0.8" />
  <rect x="15" y="35" width="16" height="0.7" />
  <rect x="17" y="24" width="12" height="0.6" />
  <!-- Foresail (course, lower) -->
  <path d="M 70 50 L 88 50 L 88 58 Q 79 60 70 58 Z" />
  <!-- Foretopsail -->
  <path d="M 71 34 L 87 34 L 87 47 L 71 47 Z" />
  <!-- Foretopgallant -->
  <path d="M 73 21 L 85 21 L 85 31 L 73 31 Z" />
  <!-- Mainsail (course, lower, central, largest) -->
  <path d="M 40 46 L 62 46 L 62 58 Q 51 60 40 58 Z" />
  <!-- Maintopsail -->
  <path d="M 42 28 L 60 28 L 60 43 L 42 43 Z" />
  <!-- Maintopgallant -->
  <path d="M 44 13 L 58 13 L 58 25 L 44 25 Z" />
  <!-- Mizzensail -->
  <path d="M 14 50 L 32 50 L 32 58 Q 23 60 14 58 Z" />
  <!-- Mizzentopsail -->
  <path d="M 15 36 L 31 36 L 31 47 L 15 47 Z" />
  <!-- Mizzentopgallant -->
  <path d="M 17 25 L 29 25 L 29 33 L 17 33 Z" />
  <!-- Jib (triangular sail forward of foremast) -->
  <path d="M 88 50 L 100 58 L 88 58 Z" />
  <!-- Pennant flying from mainmast top -->
  <path d="M 51 4 L 60 5 L 56 7 L 60 9 L 51 8 Z" />
</svg>
