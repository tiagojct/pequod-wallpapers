<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Sperm whale, side view. Distinctive blocky head (~35% of body
       length), tapered body, dorsal hump, low jaw, peduncle, and a
       horizontal fluke tail. The animal is shown swimming left to
       right with its mouth slightly open. -->
  <!-- Body: head + back + tapering peduncle, all in one path. -->
  <path d="M 4 52
           Q 4 38 14 36
           Q 22 35 30 36
           Q 38 36 46 39
           L 54 41
           Q 60 41 64 39
           L 70 39
           Q 73 41 75 44
           Q 80 46 84 50
           L 88 52
           Q 86 56 78 56
           Q 70 58 62 56
           Q 54 54 46 55
           Q 38 56 30 56
           Q 22 56 14 56
           Q 6 56 4 52 Z" />
  <!-- Lower jaw (small, narrow, defining): just under the head -->
  <path d="M 6 48 Q 14 50 22 49 L 24 51 Q 14 52 6 50 Z" />
  <!-- Dorsal hump (knuckle, not a fin): just past midpoint -->
  <path d="M 50 39 Q 56 36 60 38 Q 56 39 50 40 Z" />
  <!-- Smaller knuckles between hump and tail -->
  <path d="M 64 41 Q 67 39.5 70 40.5 Q 68 41 65 41.5 Z" />
  <path d="M 73 43 Q 75 42 77 43 Q 75 43.5 73 44 Z" />
  <!-- Flukes (horizontal tail), seen edge-on as a sweep -->
  <path d="M 84 48
           Q 92 42 100 42
           Q 96 50 88 51
           L 90 52
           Q 96 53 100 56
           Q 92 60 84 54 Z" />
  <!-- Eye: small dot in the head -->
  <circle cx="14" cy="46" r="0.9" fill="#ffffff" fill-opacity="0.55" />
  <!-- Subtle blowhole indicator on top of head -->
  <path d="M 12 38 Q 13.5 37.5 15 38 L 14 38.5 Q 13 39 12 39 Z" fill="#ffffff" fill-opacity="0.35" />
</svg>
