<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Eight-point compass rose. Cardinal points (N, S, E, W) are
       longer; intercardinal points (NE, SE, SW, NW) shorter. Each
       point is a long thin diamond so the silhouette has clear
       internal structure. A small decorative ring at the centre, and
       a fleur-de-lis spike on top to mark north. Slightly weathered:
       point widths and lengths vary by a percent or two. -->
  <!-- North (long, with fleur-de-lis spike) -->
  <path d="M 50 4
           L 53 50
           L 50 46
           L 47 50 Z" />
  <!-- North fleur-de-lis (small diamond at the very tip) -->
  <path d="M 50 0 L 53 6 L 50 4 L 47 6 Z" />
  <!-- South (slightly shorter) -->
  <path d="M 50 96
           L 47 50
           L 50 54
           L 53 50 Z" />
  <!-- East -->
  <path d="M 94 50
           L 50 53
           L 54 50
           L 50 47 Z" />
  <!-- West -->
  <path d="M 6 50
           L 50 47
           L 46 50
           L 50 53 Z" />
  <!-- Northeast (intercardinal, shorter) -->
  <path d="M 78 22
           L 53 47
           L 55 49
           L 51 51 Z" />
  <!-- Southeast -->
  <path d="M 78 78
           L 53 53
           L 51 49
           L 55 51 Z" />
  <!-- Southwest -->
  <path d="M 22 78
           L 47 53
           L 45 51
           L 49 49 Z" />
  <!-- Northwest -->
  <path d="M 22 22
           L 47 47
           L 49 51
           L 45 49 Z" />
  <!-- Centre disc -->
  <circle cx="50" cy="50" r="3.6" />
  <!-- Inner negative-space ring (read as detail at large sizes) -->
  <circle cx="50" cy="50" r="1.6" fill="#ffffff" fill-opacity="0.35" />
  <!-- Outer decorative ring (very thin) -->
  <path d="M 50 18
           A 32 32 0 0 1 82 50
           A 32 32 0 0 1 50 82
           A 32 32 0 0 1 18 50
           A 32 32 0 0 1 50 18 Z
           M 50 19
           A 31 31 0 0 0 19 50
           A 31 31 0 0 0 50 81
           A 31 31 0 0 0 81 50
           A 31 31 0 0 0 50 19 Z"
        fill-rule="evenodd" />
</svg>
