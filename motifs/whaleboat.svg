<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Whaleboat: 28-foot double-ended pulling boat as carried on
       Nantucket whaleships. Pointed at both ends, low gunwale, mast
       set well forward with a small spritsail, harpooner standing
       at the bow with the harpoon raised, four oarsmen along the
       middle. Side profile, bow at right (the boat is pursuing). -->
  <!-- Hull: double-ended, pointed both ends. -->
  <path d="M 4 60
           Q 14 56 24 56
           L 76 56
           Q 86 56 96 60
           Q 92 66 86 68
           L 14 68
           Q 8 66 4 60 Z" />
  <!-- Inner hull line for thickness -->
  <path d="M 8 60 Q 16 58 24 58 L 76 58 Q 84 58 92 60 L 92 60.6 Q 84 58.6 76 58.6 L 24 58.6 Q 16 58.6 8 60.6 Z" />
  <!-- Mast (forward of centre) -->
  <rect x="60" y="22" width="1.2" height="34" />
  <!-- Spritsail: small four-cornered sail -->
  <path d="M 61 24 L 78 28 L 78 50 L 61 53 Z" />
  <!-- Sprit (diagonal pole supporting upper outer corner of sail) -->
  <path d="M 61 53 L 78 28 L 78 28.6 L 61 53.6 Z" />
  <!-- Oarsmen: four small bumps along the gunwale -->
  <path d="M 32 50 Q 34 47 36 50 Z" />
  <path d="M 40 49 Q 42 46 44 49 Z" />
  <path d="M 48 50 Q 50 47 52 50 Z" />
  <path d="M 56 50 Q 58 47 60 50 Z" />
  <!-- Harpooner standing at the bow -->
  <ellipse cx="84" cy="48" rx="2" ry="3" />
  <rect x="83" y="50" width="2" height="6" />
  <!-- Harpoon raised above the harpooner -->
  <path d="M 86 24 L 87 50 L 86 50 L 85 24 Z" />
  <!-- Harpoon barb -->
  <path d="M 84 24 L 86 20 L 88 24 L 87 24 L 86 22 L 85 24 Z" />
  <!-- Oars (a few, slanted) -->
  <path d="M 28 56 L 18 76 L 19.5 76 L 29.5 56 Z" />
  <path d="M 40 56 L 30 76 L 31.5 76 L 41.5 56 Z" />
  <path d="M 52 56 L 42 76 L 43.5 76 L 53.5 56 Z" />
  <path d="M 64 56 L 54 76 L 55.5 76 L 65.5 56 Z" />
  <!-- Bow line (curved peak) -->
  <path d="M 96 60 L 100 58 L 100 60 L 96 61 Z" />
</svg>
